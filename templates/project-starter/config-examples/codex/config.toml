# Project-level MCP note: copy only relevant MCPs into your repo's .codex/config.toml. Keep global config minimal.

# Example Codex MCP configuration
# Copy relevant parts into:
#   ~/.codex/config.toml
# or project-scoped:
#   your-repo/.codex/config.toml

# Figma remote MCP
[mcp_servers.figma]
url = "https://mcp.figma.com/mcp"
enabled = true
required = false
tool_timeout_sec = 60

# Google Stitch MCP
# Replace with the current official Stitch MCP endpoint from Google's docs.
